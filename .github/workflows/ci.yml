name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  android-and-tests:
    name: Android build & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # global.json pins an exact preview SDK (11.0.100-preview.6.26359.118).
      # setup-dotnet's release index may not have this preview yet, so install
      # it directly with the official dotnet-install script using the pinned version.
      - name: Install pinned .NET SDK
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --version 11.0.100-preview.6.26359.118 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Verify SDK
        run: dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Only the Android workload is available on Linux; the app also targets
      # net11.0-ios, so restrict the build to the Android TFM to avoid restoring
      # the iOS SDK packs (NETSDK1178) which don't exist on this OS.
      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Build Android (unsigned, Release)
        run: dotnet build src/MauiDay.App/MauiDay.App.csproj -c Release -p:CIBuildTfm=net11.0-android

      - name: Run unit tests
        run: dotnet test tests/MauiDay.App.Tests/MauiDay.App.Tests.csproj -c Release

  ios:
    name: iOS build (unsigned)
    # The .NET 11 Preview 6 iOS SDK (26.5.11720-net11-p6) requires Xcode 26.6,
    # which ships by default on the macos-26 image.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install pinned .NET SDK
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --version 11.0.100-preview.6.26359.118 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Verify SDK
        run: dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Build iOS (unsigned, Release)
        run: dotnet build src/MauiDay.App/MauiDay.App.csproj -c Release -p:CIBuildTfm=net11.0-ios /p:CodesignKey= /p:EnableCodeSigning=false
