name: Publish iOS (App Store / TestFlight)

# Builds a signed .ipa and uploads it to App Store Connect / TestFlight.
# All account-specific values come from GitHub Actions secrets / variables.
# See docs/publishing.md for the full list of required secrets and variables.

on:
  workflow_dispatch:
    inputs:
      display_version:
        description: "ApplicationDisplayVersion (marketing version, e.g. 1.0). Leave empty to use the csproj value."
        required: false
        type: string
      build_number:
        description: "ApplicationVersion (build number, e.g. 42). Leave empty to use the csproj value."
        required: false
        type: string
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  DOTNET_SDK_VERSION: "11.0.100-preview.6.26359.118"
  APP_PROJECT: "src/MauiDay.App/MauiDay.App.csproj"
  TARGET_FRAMEWORK: "net11.0-ios"

jobs:
  publish-ios:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.6
        run: |
          if [ -d /Applications/Xcode_26.6.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer
          else
            LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
            [ -n "$LATEST" ] && sudo xcode-select -s "$LATEST/Contents/Developer"
          fi
          xcodebuild -version

      - name: Setup .NET SDK (pinned preview)
        id: setup-dotnet
        uses: actions/setup-dotnet@v4
        continue-on-error: true
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Fallback install pinned .NET SDK via dotnet-install
        if: steps.setup-dotnet.outcome != 'success'
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --version "${DOTNET_SDK_VERSION}" --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Print .NET info
        run: dotnet --info

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Import Apple code-signing certificate and provisioning profile
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          # Derive the profile UUID and name so we can reference them during the build.
          PROFILE_UUID=$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" | plutil -extract UUID raw -)
          PROFILE_NAME=$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" | plutil -extract Name raw -)
          cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Resolve signing identity
        run: |
          # Grab the imported distribution certificate's common name for -p:CodesignKey.
          IDENTITY=$(security find-identity -v -p codesigning | grep -m1 -oE '"[^"]+"' | tr -d '"')
          echo "CODESIGN_KEY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using signing identity: $IDENTITY"

      - name: Compute version arguments
        id: versionargs
        run: |
          ARGS=""
          # Prefer explicit workflow_dispatch inputs; otherwise derive build number from a v* tag.
          DISPLAY_VERSION="${{ inputs.display_version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$DISPLAY_VERSION" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            DISPLAY_VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi
          if [ -n "$DISPLAY_VERSION" ]; then
            ARGS="$ARGS -p:ApplicationDisplayVersion=$DISPLAY_VERSION"
          fi
          if [ -n "$BUILD_NUMBER" ]; then
            ARGS="$ARGS -p:ApplicationVersion=$BUILD_NUMBER"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Version args: $ARGS"

      - name: Build signed .ipa
        run: |
          dotnet publish "${{ env.APP_PROJECT }}" \
            -c Release \
            -f "${{ env.TARGET_FRAMEWORK }}" \
            -p:CIBuildTfm="${{ env.TARGET_FRAMEWORK }}" \
            -p:ArchiveOnBuild=true \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="${CODESIGN_KEY}" \
            -p:CodesignProvision="${PROFILE_NAME}" \
            -p:CodesignTeamId="${{ vars.APPLE_TEAM_ID }}" \
            ${{ steps.versionargs.outputs.args }}

      - name: Locate .ipa
        id: findipa
        run: |
          IPA_PATH=$(find src/MauiDay.App -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "No .ipa produced" >&2
            exit 1
          fi
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Found ipa: $IPA_PATH"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: MauiDay-ios-ipa
          path: ${{ steps.findipa.outputs.ipa_path }}
          if-no-files-found: error

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          # notarytool/altool look for the key at ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8
          KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYS_DIR"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEYS_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Upload to App Store Connect / TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.findipa.outputs.ipa_path }}" \
            --apiKey "${APP_STORE_CONNECT_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_ISSUER_ID}"
